<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-xl rounded-2xl w-[380px] p-10">

        <div class="text-center mb-8">

            <div class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-xl font-bold">B</span>
            </div>

            <h1 class="text-2xl font-bold">
            BurgerHub
            </h1>

            <p class="text-gray-500 text-sm mt-2">
            Sign in to your account
            </p>

        </div>

        <form action="index.html" class="space-y-5">

            <div>

                <label class="text-sm text-gray-600">
                Email Address
                </label>

                <input
                type="email"
                placeholder="example@email.com"
                class="w-full mt-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">

            </div>

            <div>

                <label class="text-sm text-gray-600">
                Password
                </label>

                <input
                type="password"
                placeholder="Enter your password"
                class="w-full mt-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">

            </div>

            <div class="flex items-center justify-between text-sm">

                <label class="flex items-center gap-2">
                <input type="checkbox">
                Remember me
                </label>

                <a href="#" class="text-red-600 hover:underline">
                Forgot password?
                </a>

            </div>

            <button 
                class="w-full bg-red-600 text-white py-3 rounded-full font-semibold hover:bg-red-700 transition">
                Sign In
            </button>

            <p class="text-center text-sm text-gray-500 mt-4">

                Don't have an account?

                <a href="#" class="text-red-600 hover:underline">
                Sign up
                </a>

            </p>

        </form>

    </div>
</body>
</html>
